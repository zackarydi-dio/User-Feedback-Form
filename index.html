<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Feedback Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-container">
    <header class="page-header">
      <h1>User Feedback Form</h1>
      <p>Submit feedback and see your message appear instantly on the page.</p>
    </header>

    <section class="form-card">
      <form id="feedback-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" class="input-field" autocomplete="name" required>
          <span class="tooltip">Enter your full name</span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input-field" autocomplete="email" required>
          <span class="tooltip">Enter a valid email address</span>
        </div>

        <div class="form-group">
          <label for="comments">Comments</label>
          <textarea id="comments" rows="5" required></textarea>
          <p id="char-count">Characters: 0</p>
          <span class="tooltip">Share your thoughts and feedback</span>
        </div>

        <button type="submit" class="submit-btn">Submit Feedback</button>
        <p id="validation-message"></p>
      </form>
    </section>

    <section class="feedback-container">
      <h2>Submitted Feedback</h2>
      <div id="feedback-display"></div>
    </section>
  </main>

  <script src="cp_1.js"></script>
</body>
</html>
